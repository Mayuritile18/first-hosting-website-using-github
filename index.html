<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">My Store</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </nav>

        <div class="cart">
            <a href="#">Cart (0)</a>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome To My Store</h1>
        <p>Discover amazing products at affordable prices.</p>
        <button>Shop Now</button>
    </section>

    <section class="products">

        <div class="product-card">
            <img src="./images/headphons.jpg" alt="Product">
            <h3>Product 1</h3>
            <p>$29.99</p>
            <button>Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="./images/smartwatch.jpg" alt="Product">
            <h3>Product 2</h3>
            <p>$39.99</p>
            <button>Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="./images/laptop.jpg" alt="Product">
            <h3>Product 3</h3>
            <p>$49.99</p>
            <button>Add To Cart</button>
        </div>

    </section>

    <footer>
        <p>&copy; 2026 My Store. All Rights Reserved.</p>
    </footer>

</body>
</html>
